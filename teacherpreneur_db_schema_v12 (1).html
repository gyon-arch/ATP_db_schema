* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f4f5f7; overflow:hidden; width:100vw; height:100vh; font-family:'Noto Sans KR',sans-serif; }
.toolbar {
  position:fixed; top:14px; left:50%; transform:translateX(-50%);

.toolbar strong { color:#1e293b; font-size:13px; }
.sep { width:1px; height:16px; background:#e2e5ec; }
.btn { padding:3px 10px; border-radius:5px; border:1px solid #e2e5ec; background:#f8fafc; cursor:pointer; font-size:11px; color:#475569; }
.btn:hover { background:#f1f5f9; }
.legend {
  position:fixed; bottom:18px; right:18px;
  background:#fff; border:1px solid #e2e5ec; border-radius:12px;

  z-index:100; line-height:1.9; min-width:240px;
}
.lt { font-size:12px; font-weight:700; color:#94a3b8; margin-bottom:12px; letter-spacing:.1em; text-transform:uppercase; font-family:'IBM Plex Mono',monospace; }
.li { display:flex; align-items:center; gap:10px; margin-bottom:7px; color:#374151; font-size:13px; }
.li:last-child { margin-bottom:0; }
.ld { width:14px; height:14px; border-radius:4px; flex-shrink:0; }
#main-svg { display:block; width:100vw; height:100vh; cursor:grab; }
#main-svg:active { cursor:grabbing; }
.session-badge {
  position:fixed; top:14px; right:18px;
  background:#fef9c3; border:1px solid #fde047; border-radius:8px;
  padding:6px 12px; font-size:11px; color:#713f12; z-index:100;
}

const COL_X={'0':C0,'1':C1,'1b':C1B,'2':C2,'3':C3};
const colY={'0':GROUP_H+GROUP_GAP,'1':GROUP_H+GROUP_GAP,'1b':GROUP_H+GROUP_GAP,'2':GROUP_H+GROUP_GAP,'3':GROUP_H+GROUP_GAP};
const nodeRects={};
const fieldYMap={};

TABLES.forEach(tb=>{
  const nRows=tb.fields.filter(f=>f.k!=='-').length;
  const nSeps=tb.fields.filter(f=>f.k==='-').length;
  const h=HDR_H+nRows*ROW_H+nSeps*8+8;
  const colKey=String(tb.col);
  const x=COL_X[colKey];
  const y=colY[colKey];
  nodeRects[tb.id]={x,y,w:W,h};
  colY[colKey]+=h+ROW_GAP;
  let cy=y+HDR_H+ROW_H/2+2;
  tb.fields.forEach(f=>{
    if(f.k==='-'){cy+=8;return;}
    fieldYMap[`${tb.id}:${f.n}`]=cy;
    cy+=ROW_H;
  });
});

function makeNode(tb){
  const r=nodeRects[tb.id];
  const g=document.createElementNS(NS,'g');
  g.setAttribute('data-node',tb.id);
  g.setAttribute('transform',`translate(${r.x},${r.y})`);

  let dragging=false,dx=0,dy=0,ox=0,oy=0;
  g.addEventListener('mousedown',e=>{
    e.stopPropagation();dragging=true;
    dx=e.clientX;dy=e.clientY;ox=r.x;oy=r.y;
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    r.x=ox+(e.clientX-dx)/vscale;
    r.y=oy+(e.clientY-dy)/vscale;
    g.setAttribute('transform',`translate(${r.x},${r.y})`);
    redrawEdges();
  });
  window.addEventListener('mouseup',()=>{dragging=false;});

  const shadow=document.createElementNS(NS,'rect');
  shadow.setAttribute('x','2');shadow.setAttribute('y','3');
  shadow.setAttribute('width',W);shadow.setAttribute('height',r.h);
  shadow.setAttribute('rx','10');shadow.setAttribute('fill','rgba(0,0,0,0.06)');
  g.appendChild(shadow);

  const card=document.createElementNS(NS,'rect');
  card.setAttribute('width',W);card.setAttribute('height',r.h);
  card.setAttribute('rx','10');card.setAttribute('fill','#fff');
  card.setAttribute('stroke','#e2e8f0');card.setAttribute('stroke-width','1');
  g.appendChild(card);

  const hdr=document.createElementNS(NS,'rect');
  hdr.setAttribute('width',W);hdr.setAttribute('height',HDR_H);
  hdr.setAttribute('rx','10');hdr.setAttribute('fill',tb.color);
  g.appendChild(hdr);
  const hdrBot=document.createElementNS(NS,'rect');
  hdrBot.setAttribute('y',HDR_H-10);hdrBot.setAttribute('width',W);hdrBot.setAttribute('height',10);
  hdrBot.setAttribute('fill',tb.color);g.appendChild(hdrBot);

  const hl=document.createElementNS(NS,'text');
  hl.setAttribute('x','12');hl.setAttribute('y','16');
  hl.setAttribute('font-family','IBM Plex Mono,monospace');
  hl.setAttribute('font-size','12');hl.setAttribute('font-weight','600');
  hl.setAttribute('fill','rgba(255,255,255,0.95)');
  hl.textContent=tb.label;g.appendChild(hl);

  const hr=document.createElementNS(NS,'text');
  hr.setAttribute('x',W-10);hr.setAttribute('y','30');
  hr.setAttribute('font-family','Noto Sans KR,sans-serif');
  hr.setAttribute('font-size','10');hr.setAttribute('fill','rgba(255,255,255,0.75)');
  hr.setAttribute('text-anchor','end');hr.textContent=tb.role;g.appendChild(hr);

  const divL=document.createElementNS(NS,'line');
  divL.setAttribute('x1','0');divL.setAttribute('y1',HDR_H);
  divL.setAttribute('x2',W);divL.setAttribute('y2',HDR_H);
  divL.setAttribute('stroke','#e2e8f0');divL.setAttribute('stroke-width','0.8');
  g.appendChild(divL);

  let cy=HDR_H+4;
  tb.fields.forEach((f,i)=>{
    if(f.k==='-'){
      const sep=document.createElementNS(NS,'line');
      sep.setAttribute('x1','8');sep.setAttribute('y1',cy+4);
      sep.setAttribute('x2',W-8);sep.setAttribute('y2',cy+4);
      sep.setAttribute('stroke','#f1f5f9');sep.setAttribute('stroke-width','0.8');
      g.appendChild(sep);cy+=8;return;
    }
    if(f.s){
      const hl2=document.createElementNS(NS,'rect');
      hl2.setAttribute('x','1');hl2.setAttribute('y',cy);
      hl2.setAttribute('width',W-2);hl2.setAttribute('height',ROW_H);
      hl2.setAttribute('fill','#fef9c3');g.appendChild(hl2);
    } else {
      const rowBg=document.createElementNS(NS,'rect');
      rowBg.setAttribute('x','1');rowBg.setAttribute('y',cy);
      rowBg.setAttribute('width',W-2);rowBg.setAttribute('height',ROW_H);
      rowBg.setAttribute('fill',i%2===0?'#fafbfc':'#fff');g.appendChild(rowBg);
    }
    const b=BADGE[f.k]||BADGE.F;
    const bw=f.k==='FM'?28:24;
    const badgeBg=document.createElementNS(NS,'rect');
    badgeBg.setAttribute('x','8');badgeBg.setAttribute('y',cy+4);
    badgeBg.setAttribute('width',bw);badgeBg.setAttribute('height',14);
    badgeBg.setAttribute('rx','3');badgeBg.setAttribute('fill',b.bg);g.appendChild(badgeBg);

    const badgeTxt=document.createElementNS(NS,'text');
    badgeTxt.setAttribute('x',8+bw/2);badgeTxt.setAttribute('y',cy+13);
    badgeTxt.setAttribute('font-family','IBM Plex Mono,monospace');
    badgeTxt.setAttribute('font-size','9');badgeTxt.setAttribute('font-weight','600');
    badgeTxt.setAttribute('fill',b.fg);badgeTxt.setAttribute('text-anchor','middle');
    badgeTxt.textContent=b.l;g.appendChild(badgeTxt);

    const fname=document.createElementNS(NS,'text');
    fname.setAttribute('x','42');fname.setAttribute('y',cy+ROW_H/2+1);
    fname.setAttribute('font-family','Noto Sans KR,sans-serif');
    fname.setAttribute('font-size','10');fname.setAttribute('fill','#374151');
    fname.setAttribute('dominant-baseline','middle');
    const dn=f.n.length>30?f.n.substring(0,29)+'…':f.n;
    fname.textContent=dn;g.appendChild(fname);
    cy+=ROW_H;
  });
  nodeG.appendChild(g);
}

function orthoPath(x1,y1,x2,y2){
  const midX=(x1+x2)/2;
  return `M${x1},${y1} H${midX} V${y2} H${x2}`;
}

function redrawEdges(){
  edgeG.innerHTML='';
  // FK 실선
  TABLES.forEach(tb=>{
    tb.fields.forEach(f=>{
      if(!f.link)return;
      const toTb=TABLES.find(t=>t.id===f.link.to);
      if(!toTb)return;
      const fromX=nodeRects[tb.id].x+W;
      const fromY=fieldYMap[`${tb.id}:${f.n}`]||nodeRects[tb.id].y+HDR_H+ROW_H/2;
      const toKey=`${toTb.id}:${f.link.toField}`;
      const toY=fieldYMap[toKey]||(nodeRects[toTb.id].y+HDR_H+ROW_H/2);
      const sameCol=Math.abs(nodeRects[tb.id].x-nodeRects[toTb.id].x)<10;
      const toX=sameCol?nodeRects[toTb.id].x+W:nodeRects[toTb.id].x;
      let d;
      if(sameCol){const ox=nodeRects[tb.id].x+W+60;d=`M${fromX},${fromY} H${ox} V${toY} H${toX}`;}
      else{d=orthoPath(fromX,fromY,toX,toY);}
      const col=tb.color;
      const path=document.createElementNS(NS,'path');
      path.setAttribute('d',d);path.setAttribute('stroke',col);
      path.setAttribute('stroke-width','1.4');path.setAttribute('fill','none');
      path.setAttribute('opacity','0.55');edgeG.appendChild(path);
      const c1=document.createElementNS(NS,'circle');
      c1.setAttribute('cx',fromX+6);c1.setAttribute('cy',fromY);
      c1.setAttribute('r','4');c1.setAttribute('fill','#fff');
      c1.setAttribute('stroke',col);c1.setAttribute('stroke-width','1.8');
      edgeG.appendChild(c1);
      const endX=sameCol?nodeRects[toTb.id].x+W:nodeRects[toTb.id].x;
      const star=document.createElementNS(NS,'text');
      star.setAttribute('x',sameCol?endX+8:endX-6);
      star.setAttribute('y',toY+4);
      star.setAttribute('font-family','IBM Plex Mono,monospace');
      star.setAttribute('font-size','12');star.setAttribute('font-weight','700');
      star.setAttribute('fill',col);star.setAttribute('text-anchor',sameCol?'start':'end');
      star.textContent='1';edgeG.appendChild(star);
      const nLabel=document.createElementNS(NS,'text');
      nLabel.setAttribute('x',fromX+14);nLabel.setAttribute('y',fromY+4);
      nLabel.setAttribute('font-family','IBM Plex Mono,monospace');
      nLabel.setAttribute('font-size','12');nLabel.setAttribute('font-weight','700');
      nLabel.setAttribute('fill',col);nLabel.setAttribute('opacity','0.7');
      nLabel.textContent='N';edgeG.appendChild(nLabel);
    });
  });
  // AGG 점선
  AGG.forEach(e=>{
    const fromR=nodeRects[e.from];
    const toR=nodeRects[e.to];
    if(!fromR||!toR)return;
    const fromY=fieldYMap[`${e.from}:${e.fField}`]||fromR.y+fromR.h/2;
    const toY=fieldYMap[`${e.to}:${e.tField}`]||toR.y+toR.h/2;
    const fromX=fromR.x+W+8;
    const toX=toR.x-8;
    const d=orthoPath(fromX,fromY,toX,toY);
    const path=document.createElementNS(NS,'path');
    path.setAttribute('d',d);path.setAttribute('stroke','#f59e0b');
    path.setAttribute('stroke-width','1.4');path.setAttribute('fill','none');
    path.setAttribute('stroke-dasharray','5,3');path.setAttribute('opacity','0.7');
    edgeG.appendChild(path);
    const l1=document.createElementNS(NS,'line');
    l1.setAttribute('x1',fromR.x+W);l1.setAttribute('y1',fromY);
    l1.setAttribute('x2',fromX);l1.setAttribute('y2',fromY);
    l1.setAttribute('stroke','#f59e0b');l1.setAttribute('stroke-width','1.4');
    l1.setAttribute('opacity','0.7');edgeG.appendChild(l1);
    const l2=document.createElementNS(NS,'line');
    l2.setAttribute('x1',toX);l2.setAttribute('y1',toY);
    l2.setAttribute('x2',toR.x);l2.setAttribute('y2',toY);
    l2.setAttribute('stroke','#f59e0b');l2.setAttribute('stroke-width','1.4');
    l2.setAttribute('opacity','0.7');edgeG.appendChild(l2);
    const c1=document.createElementNS(NS,'circle');
    c1.setAttribute('cx',fromX);c1.setAttribute('cy',fromY);
    c1.setAttribute('r','4');c1.setAttribute('fill','#fff');
    c1.setAttribute('stroke','#f59e0b');c1.setAttribute('stroke-width','1.8');
    edgeG.appendChild(c1);
    const c2=document.createElementNS(NS,'circle');
    c2.setAttribute('cx',toX);c2.setAttribute('cy',toY);
    c2.setAttribute('r','4');c2.setAttribute('fill','#f59e0b');
    edgeG.appendChild(c2);
    const mx=(fromX+toX)/2,my=(fromY+toY)/2;
    const tw=e.label.length*5+14;
    const lbg=document.createElementNS(NS,'rect');
    lbg.setAttribute('x',mx-tw/2);lbg.setAttribute('y',my-8);
    lbg.setAttribute('width',tw);lbg.setAttribute('height',15);
    lbg.setAttribute('rx','4');lbg.setAttribute('fill','#fffbeb');
    lbg.setAttribute('stroke','#f59e0b');lbg.setAttribute('stroke-width','0.6');
    lbg.setAttribute('opacity','0.95');edgeG.appendChild(lbg);
    const lt=document.createElementNS(NS,'text');
    lt.setAttribute('x',mx);lt.setAttribute('y',my+1);
    lt.setAttribute('font-family','IBM Plex Mono,monospace');
    lt.setAttribute('font-size','9');lt.setAttribute('fill','#b45309');
    lt.setAttribute('text-anchor','middle');lt.setAttribute('dominant-baseline','middle');
    lt.textContent=e.label;edgeG.appendChild(lt);
  });
}

window.addEventListener('load',()=>setTimeout(redrawEdges,150));
</script>
</body>
</html>
